<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscafilme</title>
</head>

<body>
    <div class="caixa-grande">
        <h2>Busca de Filmes</h2>
        <div class="caixa-media">
            <input id="input-filme" type="text" placeholder="Digite o nome do filme">
            <button onclick="buscarFilme()">
                Buscar
            </button>
            <div class="caixa-pequena">
                <img id="poster" src="" alt="Poster do Filme">
                <h2 id="titulo"></h2>
                <p id="ano"></p>
                <p id="diretor"></p>
                <p id="genero"></p>
                <p id="nota-IMDb"></p>
            </div>
        </div>

    </div>
 <script src="app.js"></script>
</body>

</html>
